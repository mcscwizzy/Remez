server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Optional: proxy API calls to your backend to avoid CORS.
  # If you use this, run the container with: -e API_UPSTREAM=http://your-backend:8000
  # and uncomment the location below.
  #
  # location /api/ {
  #   proxy_pass ${API_UPSTREAM};
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets harder (Vite outputs hashed filenames)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
