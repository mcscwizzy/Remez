name: Remez Build and Deploy UI

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "infra/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ui-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: ui
  TF_DIR: infra
  IMAGE_NAME: remez-ui
  API_IMAGE_NAME: remez-api
  DEPLOY_ENVIRONMENT: dev
  REGISTRY_HOST: ghcr.io
  AZURE_LOCATION: eastus

jobs:
  build_push_ghcr:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST || env.REGISTRY_HOST }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          tags: |
            ${{ format('{0}/{1}/{2}:{3}', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME, github.sha) }}
            ${{ format('{0}/{1}/{2}:latest', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME) }}

  terraform_apply:
    name: Terraform Apply (Azure)
    runs-on: ubuntu-latest
    needs: build_push_ghcr
    permissions:
      contents: read
      id-token: write
    outputs:
      container_app_name: ${{ steps.tfout.outputs.container_app_name }}
      resource_group_name: ${{ steps.tfout.outputs.resource_group_name }}
      container_app_fqdn: ${{ steps.tfout.outputs.container_app_fqdn }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ vars.TFSTATE_KEY }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_IN_AUTOMATION: "true"
          IMAGE_URI: ${{ format('{0}/{1}/{2}:{3}', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME, github.sha) }}
          TF_VAR_environment: ${{ vars.DEPLOY_ENVIRONMENT || env.DEPLOY_ENVIRONMENT }}
          TF_VAR_location: ${{ vars.AZURE_LOCATION || env.AZURE_LOCATION }}
          TF_VAR_image: ${{ format('{0}/{1}/{2}:latest', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.API_IMAGE_NAME || env.API_IMAGE_NAME) }}
          TF_VAR_ui_image: ${{ format('{0}/{1}/{2}:{3}', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME, github.sha) }}
          TF_VAR_registry_server: ${{ vars.REGISTRY_HOST || env.REGISTRY_HOST }}
          TF_VAR_registry_username: ${{ secrets.GHCR_USERNAME }}
          TF_VAR_registry_password: ${{ secrets.GHCR_PAT }}
          TF_VAR_azure_ai_endpoint: ${{ secrets.AZURE_AI_ENDPOINT }}
          TF_VAR_azure_ai_api_key: ${{ secrets.AZURE_AI_API_KEY }}
        run: |
          if [ -z "${TF_VAR_ui_image}" ]; then
            echo "TF_VAR_ui_image is empty after deterministic image URI computation."
            exit 1
          fi
          terraform apply -auto-approve -input=false

      - name: Capture Terraform outputs
        id: tfout
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        run: |
          echo "container_app_name=$(terraform output -raw ui_container_app_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "container_app_fqdn=$(terraform output -raw ui_container_app_fqdn)" >> "$GITHUB_OUTPUT"

  deploy_container_app_image:
    name: Deploy Image to Azure Container App
    runs-on: ubuntu-latest
    needs: [build_push_ghcr, terraform_apply]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Update Container App image
        env:
          IMAGE_URI: ${{ format('{0}/{1}/{2}:{3}', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME, github.sha) }}
        run: |
          az containerapp update \
            --name "${{ needs.terraform_apply.outputs.container_app_name }}" \
            --resource-group "${{ needs.terraform_apply.outputs.resource_group_name }}" \
            --image "${IMAGE_URI}"

      - name: Show URL
        run: |
          echo "https://${{ needs.terraform_apply.outputs.container_app_fqdn }}"
