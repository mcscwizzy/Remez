name: Remez Build and Deploy UI

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ui-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: ui
  IMAGE_NAME: remez-ui
  REGISTRY_HOST: ghcr.io
  AZURE_LOCATION: eastus
  ACI_NAME: remez-ui
  ACI_RESOURCE_GROUP: remez-dev-rg

jobs:
  build_push_ghcr:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST || env.REGISTRY_HOST }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          tags: ${{ format('{0}/{1}/{2}:{3}', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME, github.sha) }}

  deploy_aci:
    name: Deploy to Azure Container Instance
    runs-on: ubuntu-latest
    needs: build_push_ghcr
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Container Instance
        env:
          IMAGE_URI: ${{ format('{0}/{1}/{2}:{3}', vars.REGISTRY_HOST || env.REGISTRY_HOST, vars.GHCR_NAMESPACE || github.repository_owner, vars.IMAGE_NAME || env.IMAGE_NAME, github.sha) }}
          ACI_NAME: ${{ vars.ACI_NAME || env.ACI_NAME }}
          ACI_RESOURCE_GROUP: ${{ vars.ACI_RESOURCE_GROUP || env.ACI_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION || env.AZURE_LOCATION }}
          ACI_DNS_LABEL: ${{ vars.ACI_DNS_LABEL }}
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST || env.REGISTRY_HOST }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ACI_DNS_LABEL:-}" ]; then
            echo "ACI_DNS_LABEL is required. Set it in GitHub Repository Variables."
            exit 1
          fi

          az group create \
            --name "${ACI_RESOURCE_GROUP}" \
            --location "${AZURE_LOCATION}"

          if az container show --resource-group "${ACI_RESOURCE_GROUP}" --name "${ACI_NAME}" >/dev/null 2>&1; then
            az container update \
              --resource-group "${ACI_RESOURCE_GROUP}" \
              --name "${ACI_NAME}" \
              --image "${IMAGE_URI}"
          else
            az container create \
              --resource-group "${ACI_RESOURCE_GROUP}" \
              --name "${ACI_NAME}" \
              --image "${IMAGE_URI}" \
              --registry-login-server "${REGISTRY_HOST}" \
              --registry-username "${GHCR_USERNAME}" \
              --registry-password "${GHCR_PAT}" \
              --ip-address Public \
              --ports 80 \
              --dns-name-label "${ACI_DNS_LABEL}" \
              --restart-policy Always
          fi

      - name: Show URL
        env:
          ACI_NAME: ${{ vars.ACI_NAME || env.ACI_NAME }}
          ACI_RESOURCE_GROUP: ${{ vars.ACI_RESOURCE_GROUP || env.ACI_RESOURCE_GROUP }}
        run: |
          az container show \
            --resource-group "${ACI_RESOURCE_GROUP}" \
            --name "${ACI_NAME}" \
            --query "ipAddress.fqdn" \
            --output tsv
